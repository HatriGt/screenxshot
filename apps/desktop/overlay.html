<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select region</title>
    <link rel="stylesheet" href="/src/overlay/overlay.css" />
  </head>
  <body>
    <div id="dim"></div>
    <div id="selection" hidden></div>
    <div id="countdown" aria-hidden="true" hidden></div>
    <div id="hint">Drag to select an area · Esc to cancel</div>
    <div id="bar" role="toolbar" aria-label="Capture options">
      <button id="area" class="bar__btn is-active" type="button" data-mode="area">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 8V5a1 1 0 0 1 1-1h3M16 4h3a1 1 0 0 1 1 1v3M20 16v3a1 1 0 0 1-1 1h-3M8 20H5a1 1 0 0 1-1-1v-3" />
        </svg>
        <span>Area</span>
      </button>
      <button id="screen" class="bar__btn" type="button" data-mode="screen">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="4" width="18" height="13" rx="1.5" />
          <path d="M9 21h6M12 17v4" />
        </svg>
        <span>Whole screen</span>
      </button>
      <button id="window" class="bar__btn" type="button" data-mode="window">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="5" width="18" height="14" rx="1.5" />
          <path d="M3 9h18" />
        </svg>
        <span>Window</span>
      </button>
      <span class="bar__sep" aria-hidden="true"></span>
      <button id="cancel" class="bar__btn bar__btn--ghost" type="button">Cancel</button>
    </div>
    <script type="module" src="/src/overlay/overlay.ts"></script>
  </body>
</html>
