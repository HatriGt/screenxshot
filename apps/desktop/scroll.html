<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Long screenshot</title>
    <link rel="stylesheet" href="/src/scroll/scroll.css" />
  </head>
  <body>
    <div id="scroll" class="scroll">
      <div class="scroll__text">
        <span class="scroll__title">Long screenshot</span>
        <span class="scroll__count" id="scrollcount">1 captured</span>
      </div>
      <div class="scroll__actions">
        <button type="button" class="scroll__btn" id="scrollnext">Capture next</button>
        <button type="button" class="scroll__btn scroll__btn--primary" id="scrolldone">Done</button>
        <button type="button" class="scroll__btn scroll__btn--ghost" id="scrollcancel">Cancel</button>
      </div>
    </div>
    <script type="module" src="/src/scroll/scroll.ts"></script>
  </body>
</html>
